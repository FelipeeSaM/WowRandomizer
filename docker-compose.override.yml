services:
  distributedcache:
    container_name: distributedcache
    restart: always
    ports:
      - "6379:6379"
      - "8001:8001"

  messagebroker:
    container_name: messagebroker
    hostname: messagebroker
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  randomizerdb:
    container_name: randomizerdb
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Strong!Pass1
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - randomizerdb-data:/var/opt/mssql:Z
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Strong!Pass1' -Q 'SELECT 1' -b -C 2>/dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Strong!Pass1' -Q 'SELECT 1' -b 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  wowrandomizer.api:
    container_name: wowrandomizer.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Database=Server=randomizerdb;Database=WowRandomizerDb;User Id=sa;Password=Strong!Pass1;Encrypt=False;TrustServerCertificate=True
      - Redis__Configuration=distributedcache:6379
      - MessageBroker__Host=amqp://messagebroker:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - ElasticConfiguration__Uri=http://elasticsearch:9200
    depends_on:
      randomizerdb:
        condition: service_healthy
      messagebroker:
        condition: service_started
      distributedcache:
        condition: service_started
      elasticsearch:
        condition: service_started
    ports:
      - "6000:8080"
    volumes:
      - ${HOME}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro

  wowrandomizer.character.api:
    container_name: wowrandomizer.character.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Database=Server=randomizerdb;Database=WowRandomizerCharacterDb;User Id=sa;Password=Strong!Pass1;Encrypt=False;TrustServerCertificate=True
      - Redis__Configuration=distributedcache:6379
      - MessageBroker__Host=amqp://messagebroker:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - ElasticConfiguration__Uri=http://elasticsearch:9200
    depends_on:
      randomizerdb:
        condition: service_healthy
      messagebroker:
        condition: service_started
      elasticsearch:
        condition: service_started
      distributedcache:
        condition: service_started
    ports:
      - "6001:8080"
    volumes:
      - ${HOME}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro

  yarpgateway:
    container_name: yarpgateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      - wowrandomizer.api
      - wowrandomizer.character.api
    ports:
      - "6002:8080"
    volumes:
      - ${HOME}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro

  elasticsearch:
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.watcher.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    restart: always
    ports:
      - "9200:9200"
    volumes:
        - elasticsearch-data:/usr/share/elasticsearch/data

  kibana:
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    restart: always
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  portainer:
    container_name: portainer
    image: portainer/portainer-ce
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

  web:
    container_name: wowrandomizer-web
    environment:
      - NODE_ENV=production
    ports:
      - "3000:80"
    depends_on:
      - yarpgateway

volumes:
  elasticsearch-data:
  portainer-data:
  randomizerdb-data: